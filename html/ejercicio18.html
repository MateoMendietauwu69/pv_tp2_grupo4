<!DOCTYPE html>
<html lang="es">
    <head>
        <title>Ejercicio 18</title>
    </head>
    <body>
        <script>
            let n1=Number(prompt("Ingrese el primer numero: "));
            let n2=Number(prompt("Ingrese el segundo numero: "));
            function calcularMayor(numero1,numero2)
            {
                if(numero1>numero2)
                {
                    document.write("El numero " + numero1 + " es mayor");
                }
                else if(numero2>numero1)
                {
                    document.write("El numero " + numero2 + " es mayor");
                }
                else
                {
                    document.write("Los numeros son iguales");
                }
            }
            calcularMayor(n1,n2);
        </script>
    </body>
</html>
