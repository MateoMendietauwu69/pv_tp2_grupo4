<!DOCTYPE html>
<html lang="es">
<head>  
    <title>Ejercicio 20</title>
    <link rel="stylesheet" href="../css/ejercicio20.css">
</head>
<body>
   
    <main class="container">
        <section class="card">
            <h1>Registro</h1>
            <p class="subtitle">Complete los datos</p>
            
            
            <form id="form-carge"> 
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" placeholder="Ingrese un nombre" required>
                </div>

                <div class="form-group">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" placeholder="Ingrese un apellido" required>
                </div>

                <div class="form-group">
                    <label for="email">Libreta Universetaria</label>
                    <input type="number" id="lu" placeholder="Ingrese Libreta Universitaria" required>
                </div>
                <button type="submit" id="btn-procesar">Registrar estudiante</button>

            </form>
        </section>
        <section id="resultado" class="display-area"></section> 
    </main>
        <script type="module" src="../js/ejercicio20.js"></script>

</body>
</html>
