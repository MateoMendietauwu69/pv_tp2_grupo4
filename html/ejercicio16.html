<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 16</title>
</head>
<body>

<script>
let inicio = parseInt(prompt("Ingresá el número inicial:"));
let fin = parseInt(prompt("Ingresá el número final:"));

const sumarRango = (inicio, fin) => {

    if (inicio > fin) {
        return "Error: el número inicial no puede ser mayor que el final";
    }

    let suma = 0;

    for (let i = inicio; i <= fin; i++) {
        suma += i;
    }

    return suma;
};

let resultado = sumarRango(inicio, fin);

document.write(`<h2>Resultado: ${resultado}</h2>`);
</script>
