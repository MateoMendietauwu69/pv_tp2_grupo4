<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 10</title>
</head>
<body>

<script>

let cantidad = parseInt(prompt("¿Cuántos números querés ingresar?"));

let numeros = [];
let suma = 0;

for (let i = 0; i < cantidad; i++) {
    let num = parseInt(prompt("Ingresá un número:"));
    numeros.push(num);
    suma = suma + num;
}

let promedio = suma / cantidad;

document.write("Números: " + numeros);
document.write("<br>");
document.write("Promedio: " + promedio);

</script>
