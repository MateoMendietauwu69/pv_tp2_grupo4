<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 11</title>
</head>
<body>
    <script>
        const km = Number(prompt("Ingrese la cantidad de km recorridos:"));
        const combustible = Number(prompt("Ingrese la cantidad de combustible consumido (en litros):"));

        let consumo = km / combustible;

        document.write(`<p><strong>Consumo de combustible:</strong> ${consumo} km/l</p>`);

    </script>
</body>
</html>
