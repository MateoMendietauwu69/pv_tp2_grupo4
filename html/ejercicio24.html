<!DOCTYPE html>
<html lang="es">
<head>  
    <title>Ejercicio 24</title>
    <script src="../js/ejercicio24.js" defer></script>
    <link rel="stylesheet" href="../css/ejercicio24.css">
    <link href="https://fonts.googleapis.com/css2?family=Asimovian&amp;family=Bangers&amp;display=swap" rel="stylesheet">
</head>
<body>
    <div class="opciones">
        <h1 id="titulo">Seleccionar un Lenguaje de Programacion</h1>
        <div class="opcion">
        <input type="radio" name="lenguaje" value="JavaScript" id="js">
        <label for="js">JavaScript</label>
        </div>
        <div class="opcion">
        <input type="radio" name="lenguaje" value="C++" id="c++">
        <label for="c++">C++</label>
        </div>
        <div class="opcion">
        <input type="radio" name="lenguaje" value="Pyhton" id="py">
        <label for="py">Pyhton</label>
        </div>
        <div class="opcion">
        <input type="radio" name="lenguaje" value="Java" id="java">
        <label for="java">Java</label>
        </div>
        <div class="opcion">
        <input type="radio" name="lenguaje" value="SQL" id="sql">
        <label for="sql">SQL</label>
        </div>
    </div>
    <div class="seleccion">
        <p id="titulo">Su eleccion: </p>
        <p id="resultado"></p>
    </div>
</body>
</html>
